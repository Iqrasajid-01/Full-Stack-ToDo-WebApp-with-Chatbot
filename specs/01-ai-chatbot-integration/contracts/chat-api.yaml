## Components

### Schemas

#### ChatRequest

Request body for sending a message to the chatbot.

```yaml
components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
          description: The user's message to the chatbot
          example: "Add a task to call the dentist at 3pm"
        conversation_id:
          type: integer
          nullable: true
          description: |
            Existing conversation ID to continue a conversation.
            If null or omitted, a new conversation is created.
          example: 123
        metadata:
          type: object
          nullable: true
          description: Optional metadata (e.g., project_id, session_id)
          properties:
            project_id:
              type: string
              description: Project identifier for multi-project setups
```

#### ChatResponse

Response from the chatbot after processing a message.

```yaml
    ChatResponse:
      type: object
      required:
        - reply
        - conversation_id
      properties:
        reply:
          type: string
          description: The chatbot's response message
          example: "I've created a new task: 'Call the dentist' for 3pm today."
        conversation_id:
          type: integer
          description: The conversation ID (new or existing)
          example: 456
        tool_calls:
          type: array
          description: List of MCP tools that were executed
          items:
            $ref: '#/components/schemas/ToolCall'
        metadata:
          type: object
          description: Optional metadata about the response
          properties:
            processing_time_ms:
              type: integer
              description: Time taken to process the message
            model:
              type: string
              description: LLM model used (e.g., "command-r-plus")
```

#### ToolCall

Information about a tool executed by the chatbot.

```yaml
    ToolCall:
      type: object
      required:
        - tool
        - parameters
        - result
      properties:
        tool:
          type: string
          description: Name of the MCP tool executed
          enum:
            - add_task
            - list_tasks
            - complete_task
            - delete_task
            - update_task
          example: "add_task"
        parameters:
          type: object
          description: Parameters passed to the tool
          example:
            title: "Buy groceries"
            description: "Milk, eggs, bread"
            due_date: "2026-02-18"
        result:
          type: object
          description: Result from tool execution
          properties:
            status:
              type: string
              enum: [success, error]
              example: "success"
            data:
              type: object
              description: Tool-specific result data
              example:
                id: 123
                title: "Buy groceries"
                status: "pending"
            error:
              type: string
              description: Error message if status is "error"
```

#### Conversation

Summary of a conversation.

```yaml
    Conversation:
      type: object
      required:
        - id
        - title
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          description: Conversation ID
          example: 123
        title:
          type: string
          description: Conversation title (auto-generated or user-provided)
          example: "Task Planning"
        created_at:
          type: string
          format: date-time
          description: When the conversation was created
          example: "2026-02-17T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last activity timestamp
          example: "2026-02-17T11:45:00Z"
        message_count:
          type: integer
          description: Number of messages in the conversation
          example: 15
```

#### ConversationWithMessages

Full conversation with message history.

```yaml
    ConversationWithMessages:
      type: object
      required:
        - conversation
        - messages
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
```

#### Message

Individual message in a conversation.

```yaml
    Message:
      type: object
      required:
        - id
        - conversation_id
        - user_id
        - role
        - content
        - created_at
      properties:
        id:
          type: integer
          description: Message ID
          example: 1
        conversation_id:
          type: integer
          description: Parent conversation ID
          example: 123
        user_id:
          type: string
          description: User ID (JWT subject)
          example: "user-uuid-123"
        role:
          type: string
          enum: [user, assistant]
          description: Message sender
          example: "user"
        content:
          type: string
          description: Message content
          example: "Show me my tasks"
        created_at:
          type: string
          format: date-time
          description: When the message was created
          example: "2026-02-17T10:30:00Z"
        tool_calls:
          type: object
          nullable: true
          description: Tool call data if assistant executed tools
          properties:
            calls:
              type: array
              items:
                $ref: '#/components/schemas/ToolCall'
```

#### Error

Standard error response format.

```yaml
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: "invalid_request"
            message:
              type: string
              description: Human-readable error message
              example: "Message is required"
            details:
              type: object
              nullable: true
              description: Additional error details (only in development)
```

---

## Error Codes

| Code | HTTP Status | Description |
|------|-------------|-------------|
| `invalid_request` | 400 | Request body is malformed or missing required fields |
| `unauthorized` | 401 | JWT token is missing, invalid, or expired |
| `forbidden` | 403 | User attempted to access another user's resource |
| `conversation_not_found` | 404 | Specified conversation does not exist |
| `rate_limited` | 429 | Too many requests, retry after specified time |
| `internal_error` | 500 | Unexpected server error |
| `service_unavailable` | 503 | Cohere API or other external service is down |

---

## Rate Limiting

**Default Limits**:
- 60 requests per minute per user
- 1000 requests per hour per user

**Headers**:
```
X-RateLimit-Limit: 60
X-RateLimit-Remaining: 45
X-RateLimit-Reset: 1645123456
```

**Response on Rate Limit**:
```json
{
  "error": {
    "code": "rate_limited",
    "message": "Too many requests. Please try again in 60 seconds.",
    "details": {
      "retry_after": 60
    }
  }
}
```

---

## Versioning

API version is included in the path: `/api/v1/chatbot/...`

Current version: `v1` (implicit, no version prefix in initial release)

Future versions: `/api/v2/chatbot/...`

