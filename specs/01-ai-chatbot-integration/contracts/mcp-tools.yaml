### 5. update_task

Update task details.

**Purpose**: Modify an existing task's title, description, or due date.

**Signature**:
```python
@mcp.tool()
async def update_task(
    user_id: str,
    task_id: int,
    title: str = None,
    description: str = None,
    due_date: datetime = None
) -> dict:
    """
    Update task details.
    
    Args:
        user_id: JWT-authenticated user identifier
        task_id: ID of the task to update
        title: New title (optional)
        description: New description (optional)
        due_date: New due date (optional)
    
    Returns:
        Updated task
    """
```

**Parameters**:
| Parameter | Type | Required | Description |
|-----------|------|----------|-------------|
| user_id | string | Yes (from JWT) | Authenticated user identifier |
| task_id | integer | Yes | ID of task to update |
| title | string | No | New title (1-200 chars) |
| description | string | No | New description (max 1000 chars) |
| due_date | datetime | No | New due date (ISO 8601) |

**Response (Success)**:
```json
{
  "status": "success",
  "data": {
    "id": 123,
    "title": "Buy groceries and cook dinner",
    "description": "Milk, eggs, bread, and ingredients for pasta",
    "status": "pending",
    "due_date": "2026-02-19T00:00:00Z",
    "updated_at": "2026-02-17T10:30:00Z"
  }
}
```

**Response (Not Found)**:
```json
{
  "status": "error",
  "error": "Task not found. You don't have a task with ID 123."
}
```

**Implementation**:
```python
@mcp.tool()
async def update_task(
    user_id: str,
    task_id: int,
    title: str = None,
    description: str = None,
    due_date: datetime = None
) -> dict:
    """Update task details."""
    try:
        # Find task with user_id filter (enforces isolation)
        task = await session.get(Task, task_id)
        
        if not task:
            return {
                "status": "error",
                "error": f"Task not found. You don't have a task with ID {task_id}."
            }
        
        # Verify ownership
        if task.user_id != user_id:
            return {
                "status": "error",
                "error": "Access denied. You can only modify your own tasks."
            }
        
        # Validate and update fields
        if title is not None:
            if not title or len(title) > 200:
                return {
                    "status": "error",
                    "error": "Title must be between 1 and 200 characters"
                }
            task.title = title
        
        if description is not None:
            if len(description) > 1000:
                return {
                    "status": "error",
                    "error": "Description must be less than 1000 characters"
                }
            task.description = description
        
        if due_date is not None:
            task.due_date = due_date
        
        task.updated_at = datetime.utcnow()
        
        session.add(task)
        await session.commit()
        await session.refresh(task)
        
        return {
            "status": "success",
            "data": {
                "id": task.id,
                "title": task.title,
                "description": task.description,
                "status": task.status,
                "due_date": task.due_date.isoformat() if task.due_date else None,
                "updated_at": task.updated_at.isoformat()
            }
        }
        
    except Exception as e:
        logger.error(f"Error updating task: {e}")
        return {
            "status": "error",
            "error": "Failed to update task. Please try again."
        }
```

**Example AI Usage**:
```
User: "Change the grocery task to include milk and eggs"
Agent → MCP: update_task(
  user_id="user-uuid-123",
  task_id=123,
  description="Milk, eggs, bread"
)
MCP → Agent: {status: "success", data: {...}}
Agent → User: "I've updated the task to include milk, eggs, and bread."
```

