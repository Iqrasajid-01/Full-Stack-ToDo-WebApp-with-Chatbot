## Tool Definitions

### 1. add_task

Add a new task for the authenticated user.

**Purpose**: Create a new task in the user's todo list.

**Signature**:
```python
@mcp.tool()
async def add_task(
    user_id: str,
    title: str,
    description: str = "",
    due_date: datetime = None
) -> dict:
    """
    Add a new task for the authenticated user.
    
    Args:
        user_id: JWT-authenticated user identifier (never from request)
        title: Task title (required, 1-200 characters)
        description: Optional task description (max 1000 characters)
        due_date: Optional due date (ISO 8601 format)
    
    Returns:
        Created task with id, title, status, due_date
    """
```

**Parameters**:
| Parameter | Type | Required | Description |
|-----------|------|----------|-------------|
| user_id | string | Yes (from JWT) | Authenticated user identifier |
| title | string | Yes | Task title (1-200 chars) |
| description | string | No | Task description (max 1000 chars) |
| due_date | datetime | No | Due date in ISO 8601 format |

**Response (Success)**:
```json
{
  "status": "success",
  "data": {
    "id": 123,
    "user_id": "user-uuid-123",
    "title": "Buy groceries",
    "description": "Milk, eggs, bread",
    "status": "pending",
    "due_date": "2026-02-18T00:00:00Z",
    "created_at": "2026-02-17T10:30:00Z",
    "updated_at": "2026-02-17T10:30:00Z"
  }
}
```

**Response (Error)**:
```json
{
  "status": "error",
  "error": "Title is required and must be between 1 and 200 characters"
}
```

**Implementation**:
```python
@mcp.tool()
async def add_task(
    user_id: str,
    title: str,
    description: str = "",
    due_date: datetime = None
) -> dict:
    """Add a new task for the authenticated user."""
    try:
        # Validate input
        if not title or len(title) > 200:
            return {
                "status": "error",
                "error": "Title is required and must be between 1 and 200 characters"
            }
        
        if description and len(description) > 1000:
            return {
                "status": "error",
                "error": "Description must be less than 1000 characters"
            }
        
        # Create task with user_id (enforces isolation)
        task = Task(
            user_id=user_id,
            title=title,
            description=description,
            due_date=due_date,
            status="pending"
        )
        
        session.add(task)
        await session.commit()
        await session.refresh(task)
        
        return {
            "status": "success",
            "data": {
                "id": task.id,
                "user_id": task.user_id,
                "title": task.title,
                "description": task.description,
                "status": task.status,
                "due_date": task.due_date.isoformat() if task.due_date else None,
                "created_at": task.created_at.isoformat(),
                "updated_at": task.updated_at.isoformat()
            }
        }
        
    except Exception as e:
        logger.error(f"Error adding task: {e}")
        return {
            "status": "error",
            "error": "Failed to add task. Please try again."
        }
```

**Example AI Usage**:
```
User: "Add a task to call the dentist tomorrow at 3pm"
Agent → MCP: add_task(
  user_id="user-uuid-123",
  title="Call the dentist",
  description="",
  due_date="2026-02-18T15:00:00Z"
)
MCP → Agent: {status: "success", data: {id: 123, ...}}
Agent → User: "I've added 'Call the dentist' for tomorrow at 3pm."
```

