## Security Enforcement

### User Isolation

All tools enforce user isolation through these mechanisms:

1. **JWT Extraction**: `user_id` is extracted from JWT token, never from request body
2. **Database Filtering**: All queries include `WHERE user_id = :user_id`
3. **Ownership Verification**: Before modifying/deleting, verify `task.user_id == user_id`
4. **Error Messages**: Never reveal existence of other users' tasks

### Input Validation

All tools validate inputs:
- String lengths (title: 1-200, description: 0-1000)
- Date formats (ISO 8601)
- Enum values (status: pending/completed)
- Limit ranges (1-100)

### Error Handling

- Catch all exceptions
- Return user-friendly error messages
- Log full error details server-side
- Never expose stack traces or internal errors

