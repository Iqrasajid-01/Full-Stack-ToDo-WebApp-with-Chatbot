## Testing

### Unit Tests

```python
async def test_add_task():
    result = await add_task(
        user_id="test-user-123",
        title="Test task",
        description="Test description"
    )
    assert result["status"] == "success"
    assert result["data"]["title"] == "Test task"

async def test_add_task_unauthorized():
    # user_id from different user than task owner
    result = await complete_task(
        user_id="wrong-user-456",
        task_id=123  # belongs to test-user-123
    )
    assert result["status"] == "error"
    assert "Access denied" in result["error"]
```

### Integration Tests

```python
async def test_chatbot_add_task_flow():
    # Simulate full AI agent flow
    response = await client.post(
        "/api/chatbot/message",
        json={"message": "Add a task to buy groceries"},
        headers={"Authorization": f"Bearer {test_jwt}"}
    )
    assert response.status_code == 200
    data = response.json()
    assert "task" in data["reply"].lower()
    assert len(data["tool_calls"]) == 1
    assert data["tool_calls"][0]["tool"] == "add_task"
```

