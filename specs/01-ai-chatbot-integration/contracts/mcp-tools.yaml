### 3. complete_task

Mark a task as completed.

**Purpose**: Update a task's status to "completed".

**Signature**:
```python
@mcp.tool()
async def complete_task(
    user_id: str,
    task_id: int
) -> dict:
    """
    Mark a task as completed.
    
    Args:
        user_id: JWT-authenticated user identifier
        task_id: ID of the task to complete
    
    Returns:
        Updated task with new status
    """
```

**Parameters**:
| Parameter | Type | Required | Description |
|-----------|------|----------|-------------|
| user_id | string | Yes (from JWT) | Authenticated user identifier |
| task_id | integer | Yes | ID of task to complete |

**Response (Success)**:
```json
{
  "status": "success",
  "data": {
    "id": 123,
    "title": "Buy groceries",
    "status": "completed",
    "completed_at": "2026-02-17T10:30:00Z"
  }
}
```

**Response (Not Found)**:
```json
{
  "status": "error",
  "error": "Task not found. You don't have a task with ID 123."
}
```

**Implementation**:
```python
@mcp.tool()
async def complete_task(user_id: str, task_id: int) -> dict:
    """Mark a task as completed."""
    try:
        # Find task with user_id filter (enforces isolation)
        task = await session.get(Task, task_id)
        
        if not task:
            return {
                "status": "error",
                "error": f"Task not found. You don't have a task with ID {task_id}."
            }
        
        # Verify ownership
        if task.user_id != user_id:
            return {
                "status": "error",
                "error": "Access denied. You can only modify your own tasks."
            }
        
        # Update status
        task.status = "completed"
        task.updated_at = datetime.utcnow()
        
        session.add(task)
        await session.commit()
        await session.refresh(task)
        
        return {
            "status": "success",
            "data": {
                "id": task.id,
                "title": task.title,
                "status": task.status,
                "completed_at": task.updated_at.isoformat()
            }
        }
        
    except Exception as e:
        logger.error(f"Error completing task: {e}")
        return {
            "status": "error",
            "error": "Failed to complete task. Please try again."
        }
```

**Example AI Usage**:
```
User: "I finished buying groceries"
Agent → MCP: complete_task(user_id="user-uuid-123", task_id=123)
MCP → Agent: {status: "success", data: {id: 123, status: "completed"}}
Agent → User: "Great job! I've marked 'Buy groceries' as completed."
```

