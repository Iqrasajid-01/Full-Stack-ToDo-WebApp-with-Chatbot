### 4. delete_task

Delete a task.

**Purpose**: Permanently remove a task from the user's todo list.

**Signature**:
```python
@mcp.tool()
async def delete_task(
    user_id: str,
    task_id: int
) -> dict:
    """
    Delete a task.
    
    Args:
        user_id: JWT-authenticated user identifier
        task_id: ID of the task to delete
    
    Returns:
        Confirmation of deletion
    """
```

**Parameters**:
| Parameter | Type | Required | Description |
|-----------|------|----------|-------------|
| user_id | string | Yes (from JWT) | Authenticated user identifier |
| task_id | integer | Yes | ID of task to delete |

**Response (Success)**:
```json
{
  "status": "success",
  "data": {
    "id": 123,
    "title": "Buy groceries",
    "deleted": true
  }
}
```

**Response (Not Found)**:
```json
{
  "status": "error",
  "error": "Task not found. You don't have a task with ID 123."
}
```

**Implementation**:
```python
@mcp.tool()
async def delete_task(user_id: str, task_id: int) -> dict:
    """Delete a task."""
    try:
        # Find task with user_id filter (enforces isolation)
        task = await session.get(Task, task_id)
        
        if not task:
            return {
                "status": "error",
                "error": f"Task not found. You don't have a task with ID {task_id}."
            }
        
        # Verify ownership
        if task.user_id != user_id:
            return {
                "status": "error",
                "error": "Access denied. You can only delete your own tasks."
            }
        
        # Delete task
        await session.delete(task)
        await session.commit()
        
        return {
            "status": "success",
            "data": {
                "id": task_id,
                "title": task.title,
                "deleted": True
            }
        }
        
    except Exception as e:
        logger.error(f"Error deleting task: {e}")
        return {
            "status": "error",
            "error": "Failed to delete task. Please try again."
        }
```

**Example AI Usage**:
```
User: "Delete the grocery shopping task"
Agent → MCP: delete_task(user_id="user-uuid-123", task_id=123)
MCP → Agent: {status: "success", data: {id: 123, deleted: true}}
Agent → User: "I've deleted the task 'Buy groceries'."
```

