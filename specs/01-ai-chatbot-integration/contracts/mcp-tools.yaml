### 2. list_tasks

List tasks for the authenticated user with optional filtering.

**Purpose**: Retrieve the user's tasks with various filters.

**Signature**:
```python
@mcp.tool()
async def list_tasks(
    user_id: str,
    status: str = "all",
    limit: int = 50
) -> dict:
    """
    List tasks for the authenticated user.
    
    Args:
        user_id: JWT-authenticated user identifier
        status: Filter by status: "all", "pending", "completed"
        limit: Maximum number of tasks to return (1-100)
    
    Returns:
        List of tasks with id, title, status, due_date
    """
```

**Parameters**:
| Parameter | Type | Required | Default | Description |
|-----------|------|----------|---------|-------------|
| user_id | string | Yes (from JWT) | - | Authenticated user identifier |
| status | string | No | "all" | Filter: "all", "pending", "completed" |
| limit | integer | No | 50 | Max tasks to return (1-100) |

**Response (Success)**:
```json
{
  "status": "success",
  "data": {
    "tasks": [
      {
        "id": 123,
        "title": "Buy groceries",
        "description": "Milk, eggs, bread",
        "status": "pending",
        "due_date": "2026-02-18T00:00:00Z",
        "created_at": "2026-02-17T10:30:00Z"
      },
      {
        "id": 122,
        "title": "Call dentist",
        "description": "",
        "status": "completed",
        "due_date": null,
        "created_at": "2026-02-16T09:00:00Z"
      }
    ],
    "total": 2,
    "filtered_by": "all"
  }
}
```

**Response (Empty)**:
```json
{
  "status": "success",
  "data": {
    "tasks": [],
    "total": 0,
    "filtered_by": "all",
    "message": "You don't have any tasks yet. Would you like to create one?"
  }
}
```

**Implementation**:
```python
@mcp.tool()
async def list_tasks(
    user_id: str,
    status: str = "all",
    limit: int = 50
) -> dict:
    """List tasks for the authenticated user."""
    try:
        # Validate limit
        if limit < 1 or limit > 100:
            limit = 50
        
        # Build query with user_id filter (enforces isolation)
        query = select(Task).where(Task.user_id == user_id)
        
        # Apply status filter
        if status == "pending":
            query = query.where(Task.status == "pending")
        elif status == "completed":
            query = query.where(Task.status == "completed")
        
        # Order by created_at descending (newest first)
        query = query.order_by(Task.created_at.desc()).limit(limit)
        
        tasks = await session.exec(query)
        task_list = tasks.all()
        
        return {
            "status": "success",
            "data": {
                "tasks": [
                    {
                        "id": task.id,
                        "title": task.title,
                        "description": task.description,
                        "status": task.status,
                        "due_date": task.due_date.isoformat() if task.due_date else None,
                        "created_at": task.created_at.isoformat()
                    }
                    for task in task_list
                ],
                "total": len(task_list),
                "filtered_by": status
            }
        }
        
    except Exception as e:
        logger.error(f"Error listing tasks: {e}")
        return {
            "status": "error",
            "error": "Failed to list tasks. Please try again."
        }
```

**Example AI Usage**:
```
User: "Show me my pending tasks"
Agent → MCP: list_tasks(user_id="user-uuid-123", status="pending", limit=50)
MCP → Agent: {status: "success", data: {tasks: [...], total: 5}}
Agent → User: "You have 5 pending tasks: 1. Buy groceries, 2. Call dentist, ..."
```

