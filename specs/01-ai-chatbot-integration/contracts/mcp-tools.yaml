# MCP Tool Contracts: AI Chatbot Integration

**Version**: 1.0.0
**Date**: 2026-02-17
**Feature**: AI Chatbot Integration

---

## Overview

This document defines the Model Context Protocol (MCP) tool contracts for the AI chatbot. Each tool corresponds to a task management operation that the AI agent can invoke.

**Constitution Compliance**: All tools enforce strict user isolation (Constitution Principle III) and never allow direct database access from the AI agent (Constitution Principle IV).

---

## Tool Interface Standard

Each MCP tool follows this interface:

```python
@mcp.tool()
async def tool_name(user_id: str, **parameters) -> ToolResponse:
    """Tool description."""
    # 1. Validate user_id from JWT (never from request body)
    # 2. Perform operation with user_id filter
    # 3. Return structured response
```

**Response Format**:
```json
{
  "status": "success" | "error",
  "data": { ... },  // Present on success
  "error": "..."    // Present on error
}
```

